<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Release Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calendar-container">
        <header class="main-header">
             <h1>Game Release Calendar</h1>
             <div class="header-controls"> <!-- Group controls -->
                 <div class="theme-switcher">
                     <label class="switch" aria-label="Toggle Dark Mode">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider round"></span>
                     </label>
                     <span>Dark Mode</span>
                 </div>
                 <!-- NEW NSFW Filter Toggle -->
                 <div class="nsfw-filter">
                     <label class="switch" aria-label="Toggle NSFW Filter">
                        <input type="checkbox" id="nsfw-toggle" checked> <!-- Checked = Filter ON by default -->
                        <span class="slider round"></span>
                     </label>
                     <span>Hide NSFW</span>
                 </div>
                 <!-- End NSFW Filter Toggle -->
            </div>
        </header>

        <div class="search-seek-container">
            <!-- ... (search/seek inputs remain the same) ... -->
        </div>

        <p class="subtitle">(Showing Top Upcoming & Released Games)</p>

        <div class="calendar-header">
            <!-- ... (prev/next buttons, month/year display) ... -->
        </div>

        <div class="calendar-body">
             <div class="calendar-weekdays">
                 <!-- ... (weekdays) ... -->
             </div>
            <div id="calendar-grid" class="calendar-grid">
                <div class="loading" id="loading-indicator">Loading games...</div>
            </div>
        </div>

         <p class="api-credit">Game data provided by <a href="https://rawg.io/" target="_blank" rel="noopener">RAWG.io</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
